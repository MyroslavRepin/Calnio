# HTTP server - reverse proxy to calnio backend
server {
    listen 80;
    server_name calnio.com www.calnio.com;

    # Proxy all requests to the calnio backend
    location / {
        proxy_pass http://calnio:8000;

        # Standard proxy headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket support (if needed)
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Timeouts for API
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;

        # Buffer settings
        proxy_buffering on;
        proxy_buffer_size 4k;
        proxy_buffers 8 4k;
    }

    # Let's Encrypt challenge location (for future HTTPS setup)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }
}

