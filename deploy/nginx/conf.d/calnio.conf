# Cloudflare real IP + WebSocket map
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

# HTTP: ACME challenge + редирект на HTTPS
server {
    listen 80;
    listen [::]:80;

    server_name calnio.com www.calnio.com;

    # ACME challenge (certbot webroot)
    location ^~ /.well-known/acme-challenge/ {
        root /var/www/certbot;
        try_files $uri =404;
    }

    # Быстрый healthcheck nginx
    location = /health {
        access_log off;
        add_header Content-Type text/plain;
        return 200 "OK";
    }

    # Всё остальное переводим на HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS: reverse proxy на backend
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;

    server_name calnio.com www.calnio.com;

    ssl_certificate /etc/letsencrypt/live/calnio.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/calnio.com/privkey.pem;

    # Базовые безопасные настройки TLS
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;

    # Если домен за Cloudflare (orange cloud), иначе IP клиента будет Cloudflare.
    real_ip_header CF-Connecting-IP;
    real_ip_recursive on;

    # Cloudflare IPv4
    set_real_ip_from 173.245.48.0/20;
    set_real_ip_from 103.21.244.0/22;
    set_real_ip_from 103.22.200.0/22;
    set_real_ip_from 103.31.4.0/22;
    set_real_ip_from 141.101.64.0/18;
    set_real_ip_from 108.162.192.0/18;
    set_real_ip_from 190.93.240.0/20;
    set_real_ip_from 188.114.96.0/20;
    set_real_ip_from 197.234.240.0/22;
    set_real_ip_from 198.41.128.0/17;
    set_real_ip_from 162.158.0.0/15;
    set_real_ip_from 104.16.0.0/13;
    set_real_ip_from 104.24.0.0/14;
    set_real_ip_from 172.64.0.0/13;
    set_real_ip_from 131.0.72.0/22;

    # Cloudflare IPv6
    set_real_ip_from 2400:cb00::/32;
    set_real_ip_from 2606:4700::/32;
    set_real_ip_from 2803:f800::/32;
    set_real_ip_from 2405:b500::/32;
    set_real_ip_from 2405:8100::/32;
    set_real_ip_from 2a06:98c0::/29;
    set_real_ip_from 2c0f:f248::/32;

    # Повторяем ACME location и на 443 (не обязательно, но безвредно)
    location ^~ /.well-known/acme-challenge/ {
        root /var/www/certbot;
        try_files $uri =404;
    }

    # Headers прокси
    location / {
        proxy_pass http://calnio:8000;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        proxy_connect_timeout 30s;
        proxy_send_timeout 60s;
        proxy_read_timeout 300s;

        proxy_buffering off;
    }
}

