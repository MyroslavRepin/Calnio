services:
  calnio:
    image: calnio:latest
    container_name: calnio
    build: .
    volumes:
      - .:/calnio
      - ./logs:/calnio/logs
    ports:
     - "8000:8000"

  ngrok:
    image: ngrok/ngrok:latest
    container_name: "ngrok"
    depends_on:
      - calnio
    volumes:
      - ./ngrok.yml:/ngrok.yml
    command: start --all --config /ngrok.yml --log=stdout --log-level=info
    restart: always

  loki:
    image: grafana/loki:2.9.0
    container_name: loki
    ports:
      - "3100:3100"
    command: -config.file=/etc/loki/local-config.yaml