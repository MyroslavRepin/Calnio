services:
  backend:
    image: calnio:latest
    container_name: calnio_backend
    build: .
    environment:
      DB_URL_FULL: "${DATABASE_URL_PROD}"
      JWT_TOKEN_LOCATION: '["cookies"]'
    volumes:
      - .:/calnio
      - calnio_venv:/calnio/.venv
    ports:
      - "8080:8080"
    expose:
      - "8080"

  tunnel:
    container_name: cloudflared-tunnel
    image: cloudflare/cloudflared
    restart: unless-stopped
    command: >
      tunnel --no-autoupdate run
      --token ${CLOUDFLARED_TUNNEL_TOKEN}
    depends_on:
      - backend

volumes:
  calnio_venv: