services:
  # Main server
  calnio:
    image: calnio:latest
    container_name: calnio
    build: .
    volumes:
      - .:/calnio
      - ./logs:/calnio/logs
    ports:
      - "8000:8000"
    expose:
      - "8000"
    networks:
      - calnio_network
    logging:
      driver: json-file
      options:
        tag: "{{.ImageName}}|{{.Name}}|{{.ImageFullID}}|{{.FullID}}"

  # Port forwarding
  ngrok:
    image: ngrok/ngrok:latest
    container_name: "ngrok"
    depends_on:
      - calnio
    networks:
      - calnio_network
    volumes:
      - ./deploy/ngrok.yml:/ngrok.yml
    command: start --all --config /ngrok.yml --log=stdout --log-level=info
    restart: always
    profiles: ["dev"]

  nginx:
    image: nginx:latest
    container_name: nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/nginx/conf.d:/etc/nginx/conf.d:ro
      - ./deploy/certbot/www:/var/www/certbot:ro
      - ./deploy/certbot/conf:/etc/letsencrypt:ro
    depends_on:
      - calnio
    networks:
      - calnio_network

  certbot:
    image: certbot/certbot:latest
    container_name: certbot
    restart: unless-stopped
    volumes:
      - ./deploy/certbot/www:/var/www/certbot
      - ./deploy/certbot/conf:/etc/letsencrypt
    entrypoint: "/bin/sh -c"
    command: |
      trap exit TERM;
      while :; do
        certbot renew --webroot -w /var/www/certbot --quiet;
        sleep 12h;
      done
    depends_on:
      - nginx
    networks:
      - calnio_network

  # Cache / Workers
  redis:
    image: redis:7
    container_name: redis
    ports:
      - "6379:6379"
    networks:
      - calnio_network


# Networks
networks:
  calnio_network:
    driver: bridge