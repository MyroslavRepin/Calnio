services:
  # Main server
  calnio:
    image: calnio:latest
    container_name: calnio
    build: .
    environment:
      - HOST=0.0.0.0
      - PORT=8000
      - RELOAD=False
    ports:
     - "8000:8000"
    networks:
      - calnio_network
    logging:
      driver: json-file
      options:
        tag: "{{.ImageName}}|{{.Name}}|{{.ImageFullID}}|{{.FullID}}"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8000/ || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 5

  # Port forwarding
  ngrok:
    image: ngrok/ngrok:latest
    container_name: "ngrok"
    depends_on:
      - calnio
    networks:
      - calnio_network
    volumes:
      - ./ngrok.yml:/ngrok.yml
    command: start --all --config /ngrok.yml --log=stdout --log-level=info
    restart: always

  nginx:
    image: nginx:latest
    container_name: nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d
      - ./certbot/www:/var/www/certbot
      - ./certbot/conf:/etc/letsencrypt
    depends_on:
      - calnio
    networks:
      - calnio_network

