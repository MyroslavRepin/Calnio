services:
  # Main server
  calnio:
    image: calnio:latest
    container_name: calnio
    build: .
    volumes:
      - .:/calnio
      - ./logs:/calnio/logs
    ports:
     - "8000:8000"
    networks:
      - calnio_network
    logging:
      driver: json-file
      options:
        tag: "{{.ImageName}}|{{.Name}}|{{.ImageFullID}}|{{.FullID}}"

  litestar:
    build: .
    container_name: litestar
    command: uvicorn server.app.main_litestar:app --host 0.0.0.0 --port 8010
    ports:
      - "8010:8010"

  ngrok:
    image: ngrok/ngrok:latest
    container_name: "ngrok"
    depends_on:
      - calnio
    volumes:
      - ./ngrok.yml:/ngrok.yml
    command: start --all --config /ngrok.yml --log=stdout --log-level=info
    restart: always


  promtail:
    image: grafana/promtail:latest
    container_name: promtail
    ports:
      - "9080:9080"
    volumes:
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock
      - ./promtail-config.yaml:/etc/promtail/config.yml
      - ./logs:/var/log/calnio:ro
    command: -config.file=/etc/promtail/config.yml
    privileged: true
    deploy:
      resources:
        limits:
          memory: 100M
          cpus: "0.1"

  loki:
    image: grafana/loki:latest
    container_name: loki
    ports:
      - "3100:3100"
    volumes:
      - ./loki-config.yaml:/etc/loki/local-config.yaml

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheusdata:/prometheus
    deploy:
      resources:
        limits:
          memory: 150M
          cpus: "0.2"

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - ./grafana/datasources.yaml:/etc/grafana/provisioning/datasources/datasources.yaml
      - grafanadata:/var/lib/grafana

    deploy:
      resources:
        limits:
          memory: 200M
          cpus: "0.25"


  nginx:
    image: nginx:latest
    container_name: calnio_nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d
      - ./certbot/www:/var/www/certbot
      - ./certbot/conf:/etc/letsencrypt
    depends_on:
      - calnio
    networks:
      - calnio_network

volumes:
  grafanadata:
  prometheusdata:

networks:
  calnio_network:
    driver: bridge