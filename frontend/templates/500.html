<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>500 Internal Server Error</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap"
      rel="stylesheet"
    />
    <style>
      body {
        margin: 0;
        padding: 0;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        background-color: #f0f4f8; /* тонкий фон */
        font-family: "Inter", sans-serif;
        color: #1f2937;
        text-align: center;
      }
      .container {
        max-width: 800px;
        padding: 0 20px;
      }
      h1 {
        font-family: "Onest", sans-serif;
        font-size: clamp(100px, 20vw, 200px); /* адаптивный размер */
        margin: 0;
        font-weight: 700;
        background-color: #e75e75;
        /* background: linear-gradient(90deg, #3b82f6, #ec4899); */
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
      }
      p {
        font-size: clamp(18px, 2vw, 24px);
        margin-top: 20px;
        color: #374151;
      }
      a {
        display: inline-block;
        margin-top: 30px;
        padding: 14px 28px;
        text-decoration: none;
        font-weight: 700;
        color: #3b82f6;
        border: 2px solid #3b82f6;
        border-radius: 6px;
        transition: all 0.3s ease;
      }
      a:hover {
        background: #3b82f6;
        color: #ffffff;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>500</h1>
      <p>Oops! Something went wrong on our end.<br />Please try again later.</p>
      <a href="https://calnio.com">Go to Home</a>
    </div>
  </body>
</html>
