<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>All-in-One Dashboard | Calnio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="/static/js/dashboard.js"></script>
    <style>
      /* Кастомные цвета для Tailwind */
      @layer utilities {
        .bg-softblue {
          background-color: #b0c6ce;
        }
        .bg-cream {
          background-color: #e6e1c5;
        }
        .text-muted-purple {
          color: #896978;
        }
        .border-cream {
          border-color: #e6e1c5;
        }
        .bg-cream-transparent {
          background-color: rgba(230, 225, 197, 0.5);
        }
        .text-cream-dark {
          color: #a69f80;
        }
        .text-muted-purple-light {
          color: #a8909d;
        }
        .accent-muted-purple {
          accent-color: #896978;
        }
        .hover-muted-purple {
          transition: background-color 0.3s ease;
        }
        .hover-muted-purple:hover {
          background-color: rgba(137, 105, 120, 0.3);
        }
      }
      /* Glassmorphism */
      .glass {
        background: rgba(230, 225, 197, 0.5);
        backdrop-filter: blur(10px);
        -webkit-backdrop-filter: blur(10px);
        border: 1px solid rgba(230, 225, 197, 0.3);
        border-radius: 1rem;
        box-shadow: 0 8px 32px rgba(137, 105, 120, 0.15);
      }
      ::selection {
        background-color: #896978;
        color: #fbfbfb;
      }
    </style>
  </head>
  <body class="bg-softblue min-h-screen text-muted-purple font-sans">
    <div class="flex min-h-screen">
      <!-- Sidebar -->
      <aside
        class="w-64 glass p-6 border-cream border-r flex flex-col justify-between"
      >
        <div>
          <h1 class="text-3xl font-semibold mb-10 text-muted-purple">Calnio</h1>
          <nav class="space-y-5 text-muted-purple/90 font-medium">
            <a href="#dashboard" class="block hover:text-muted-purple-light"
              >🏠 Dashboard</a
            >
            <a href="#profile" class="block hover:text-muted-purple-light"
              >👤 Profile</a
            >
            <a href="#sync" class="block hover:text-muted-purple-light"
              >🧩 Sync</a
            >
            <a href="#events" class="block hover:text-muted-purple-light"
              >📅 Events</a
            >
            <a href="#settings" class="block hover:text-muted-purple-light"
              >⚙️ Settings</a
            >
          </nav>
        </div>

        <div>
          <form method="POST" action="/logout">
            <button
              type="submit"
              class="w-full py-2 rounded-lg bg-cream text-muted-purple font-semibold hover:bg-cream-transparent transition"
            >
              🔓 Logout
            </button>
          </form>
        </div>
      </aside>

      <!-- Main content -->
      <main class="flex-1 p-12 space-y-16">
        <!-- {% if success %}
        <div
          class="bg-green-100 border border-green-400 text-green-700 px-4 py-3 rounded mb-6"
          role="alert"
        >
          <strong class="font-bold">Success!</strong>
          <span class="block sm:inline">Profile updated succesfuly</span>
        </div>
        {% endif %} -->
        {% if request.query_params.success %}
        <div
          id="success-alert"
          class="bg-green-100 border border-green-400 text-green-700 px-4 py-3 rounded mb-6 transition-opacity duration-1000"
          role="alert"
        >
          <strong class="font-bold">Success!</strong>
        </div>

        <script>
          // Очистить параметры URL
          const url = new URL(window.location);
          url.searchParams.delete("success");
          window.history.replaceState({}, document.title, url.pathname);

          // Автоудаление алерта через 5 секунд (5000 мс)
          setTimeout(() => {
            const alertBox = document.getElementById("success-alert");
            if (alertBox) {
              alertBox.style.opacity = "0"; // Плавное исчезновение
              setTimeout(() => alertBox.remove(), 1000); // Полное удаление через 1 сек после fade out
            }
          }, 5000);
        </script>
        {% endif %}

        <!-- Dashboard Welcome -->
        <section id="dashboard">
          <h2 class="text-4xl font-semibold mb-3 text-muted-purple">
            Welcome back, {{ username }}
          </h2>
          <p class="text-muted-purple/70 text-lg">
            Here’s what’s happening in your workspace.
          </p>
        </section>

        <!-- Profile Section with editable form -->
        <form method="post" action="/update-profile">
          <section class="glass p-8 border-cream border rounded-2xl shadow-md">
            <h3 class="text-2xl font-semibold mb-6 text-muted-purple">
              👤 Profile Settings
            </h3>
            <div class="grid md:grid-cols-2 gap-8">
              <div>
                <label class="block mb-2 font-medium text-muted-purple"
                  >Username</label
                >
                <input
                  type="text"
                  name="username"
                  value="{{ username }}"
                  class="w-full rounded-lg border border-cream px-5 py-3 focus:outline-none focus:ring-2 focus:ring-muted-purple transition bg-cream"
                />
              </div>
              <div>
                <label class="block mb-2 font-medium text-muted-purple"
                  >Email</label
                >
                <input
                  type="email"
                  name="email"
                  value="{{ email }}"
                  class="w-full rounded-lg border border-cream px-5 py-3 focus:outline-none focus:ring-2 focus:ring-muted-purple transition bg-cream"
                />
              </div>
            </div>

            <div class="text-right mt-6">
              <button
                type="submit"
                class="px-8 py-3 rounded-lg bg-cream text-muted-purple font-semibold hover:bg-cream-transparent transition"
              >
                Save Changes
              </button>
            </div>
          </section>
        </form>

        <!-- ... (остальной твой контент) -->
      </main>
    </div>
  </body>
</html>
