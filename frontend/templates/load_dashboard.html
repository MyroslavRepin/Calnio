<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <title>Загрузка...</title>
    <script
      defer
      src="https://analytics.calnio.com/script.js"
      data-website-id="4c81d3ea-9951-4d28-b426-129f058ec90e"
    ></script>
  </head>
  <body>
    <h1>Пожалуйста, подождите...</h1>

    <script>
      // Функция для обновления cookies через запрос
      async function refreshCookies() {
        try {
          // Отправляем запрос на сервер для обновления куков
          const response = await fetch("/refresh", {
            method: "POST",
            credentials: "include", // важно, чтобы куки отправлялись и принимались
          });

          if (response.ok) {
            // Обновление прошло успешно, переходим на dashboard
            window.location.href = "/dashboard";
          } else {
            // Если ошибка — можно обработать, например, показать сообщение
            alert(
              "Не удалось обновить сессию. Пожалуйста, попробуйте войти снова."
            );
            window.location.href = "/login"; // или куда нужно
          }
        } catch (error) {
          alert("Ошибка соединения. Проверьте интернет и попробуйте ещё раз.");
          window.location.href = "/login";
        }
      }

      // Запускаем обновление куков сразу при загрузке страницы
      refreshCookies();
    </script>
  </body>
</html>
