<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Login | Calnio</title>

    <!-- Tailwind CDN -->
    <script src="https://cdn.tailwindcss.com"></script>

    <link
      href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=Montserrat:wght@400;600&display=swap"
      rel="stylesheet"
    />
    <script src="static/js/login.js"></script>
    <style>
      body {
        font-family: "Montserrat", sans-serif;
        background: linear-gradient(135deg, #c9b89e, #f4f1ed, #d4c5a3);
        min-height: 100vh;
      }
      h2 {
        font-family: "DM Serif Display", serif;
      }
      /* Glassmorphism */
      .glass {
        background: rgba(255 255 255 / 0.2);
        border-radius: 1.5rem;
        backdrop-filter: blur(15px);
        -webkit-backdrop-filter: blur(15px);
        border: 1px solid rgba(255 255 255 / 0.3);
        box-shadow: 0 8px 32px rgb(117 96 72 / 0.3);
      }
      ::selection {
        background-color: #b89e7dcc;
        color: white;
      }
    </style>
  </head>
  <body class="flex justify-center items-center p-6">
    <div class="glass max-w-md w-full p-10">
      <h2 class="text-center text-4xl mb-8 text-coffee-900">Login</h2>

      <form method="post" action="/login" class="space-y-7">
        <div>
          {% if error %}
          <div class="text-red-600 text-center mb-4 font-semibold">
            {{ error }}
          </div>
          {% endif %}

          <label
            for="login"
            class="block text-base font-semibold mb-2 text-coffee-900"
            >Username or Email:</label
          >
          <input
            id="login"
            name="login"
            placeholder="you@example.com"
            required
            class="w-full rounded-xl border border-coffee-400 bg-white bg-opacity-50 px-4 py-3 text-coffee-900 placeholder-coffee-600 focus:outline-none focus:ring-2 focus:ring-coffee-700 focus:border-transparent transition"
          />
        </div>

        <div>
          <label
            for="password"
            class="block text-base font-semibold mb-2 text-coffee-900"
            >Password:</label
          >
          <input
            type="password"
            id="password"
            name="password"
            placeholder="••••••••"
            required
            class="w-full rounded-xl border border-coffee-400 bg-white bg-opacity-50 px-4 py-3 text-coffee-900 placeholder-coffee-600 focus:outline-none focus:ring-2 focus:ring-coffee-700 focus:border-transparent transition"
          />
        </div>

        <button
          type="submit"
          id="loginBtn"
          class="w-full rounded-xl bg-coffee-700 py-3 text-white font-semibold hover:bg-coffee-800 transition transform hover:scale-105 active:scale-95 shadow-md"
        >
          Sign In
        </button>
      </form>

      <p class="text-center text-sm text-coffee-800 mt-6">
        Don't have an account?
        <a
          href="/signup"
          class="underline font-semibold hover:text-coffee-900 transition"
        >
          Sign up
        </a>
      </p>
    </div>

    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              coffee: {
                50: "#f8f6f0",
                100: "#f0eadf",
                200: "#d9cda9",
                300: "#c4b488",
                400: "#b29c6a",
                500: "#a2864e",
                600: "#8b7342",
                700: "#715c33",
                800: "#59492b",
                900: "#453823",
              },
            },
          },
        },
      };
    </script>
  </body>
</html>
