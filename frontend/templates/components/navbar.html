<!-- ===== SITE HEADER / NAVBAR COMPONENT ===== -->
<header class="site-header">
  <div class="header-container">
    <!-- Logo -->
    <div class="header-logo">
      <a href="/" class="logo-link">
        <span class="logo-text">Calnio</span>
      </a>
    </div>
    
    <!-- Desktop Navigation -->
    <nav class="header-nav-desktop">
      <a href="/features" class="nav-link">Features</a>
      <a href="/pricing" class="nav-link">Pricing</a>
      <a href="/about" class="nav-link">About</a>
      <a href="/contact" class="nav-link">Contact</a>
      <div class="nav-buttons">
        <a href="/login" class="btn-login">Log In</a>
        <a href="/signup" class="btn-signup">Sign Up</a>
      </div>
    </nav>
    
    <!-- Mobile Menu Button -->
    <button class="header-burger-menu" id="header-burger-menu" aria-label="Toggle navigation menu">
      <span class="burger-line"></span>
      <span class="burger-line"></span>
      <span class="burger-line"></span>
    </button>
  </div>
  
  <!-- Mobile Navigation Overlay -->
  <div class="header-mobile-overlay" id="header-mobile-overlay">
    <nav class="header-nav-mobile">
      <a href="/features" class="mobile-nav-link">Features</a>
      <a href="/pricing" class="mobile-nav-link">Pricing</a>
      <a href="/about" class="mobile-nav-link">About</a>
      <a href="/contact" class="mobile-nav-link">Contact</a>
      <div class="mobile-nav-buttons">
        <a href="/login" class="mobile-btn-login">Log In</a>
        <a href="/signup" class="mobile-btn-signup">Sign Up</a>
      </div>
    </nav>
  </div>
</header>

<!-- Header JavaScript -->
<script>
  document.addEventListener('DOMContentLoaded', function() {
    const burgerMenu = document.getElementById('header-burger-menu');
    const mobileOverlay = document.getElementById('header-mobile-overlay');
    const body = document.body;
    
    if (!burgerMenu || !mobileOverlay) {
      console.warn('Header menu elements not found');
      return;
    }
    
    // Toggle menu function
    function toggleMenu() {
      const isActive = burgerMenu.classList.contains('active');
      
      if (isActive) {
        closeMenu();
      } else {
        openMenu();
      }
    }
    
    // Open menu function
    function openMenu() {
      burgerMenu.classList.add('active');
      mobileOverlay.classList.add('active');
      body.classList.add('menu-open');
      body.style.overflow = 'hidden';
    }
    
    // Close menu function
    function closeMenu() {
      burgerMenu.classList.remove('active');
      mobileOverlay.classList.add('closing');
      
      setTimeout(() => {
        mobileOverlay.classList.remove('active', 'closing');
        body.classList.remove('menu-open');
        body.style.overflow = '';
      }, 300);
    }
    
    // Event listeners
    burgerMenu.addEventListener('click', toggleMenu);
    
    // Close menu when clicking on overlay
    mobileOverlay.addEventListener('click', function(e) {
      if (e.target === mobileOverlay) {
        closeMenu();
      }
    });
    
    // Close menu when clicking on navigation links
    const mobileNavLinks = document.querySelectorAll('.mobile-nav-link, .mobile-btn-login, .mobile-btn-signup');
    mobileNavLinks.forEach(link => {
      link.addEventListener('click', closeMenu);
    });
    
    // Close menu on escape key
    document.addEventListener('keydown', function(e) {
      if (e.key === 'Escape' && mobileOverlay.classList.contains('active')) {
        closeMenu();
      }
    });
    
    // Handle window resize
    window.addEventListener('resize', function() {
      if (window.innerWidth > 768 && mobileOverlay.classList.contains('active')) {
        closeMenu();
      }
    });
  });
</script>
