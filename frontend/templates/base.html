<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  
  <!-- Title -->
  <title>{% block title %}Calnio{% endblock %}</title>
  
  <!-- Analytics -->
  <script type="text/javascript" src="//script.crazyegg.com/pages/scripts/0130/7009.js" async="async"></script>
  <script defer src="https://analytics.calnio.com/script.js" data-website-id="4c81d3ea-9951-4d28-b426-129f058ec90e"></script>
  
  <!-- CSS Variables and Base Styles (always included) -->
  <link rel="stylesheet" href="/static/css/variables.css" />
  <link rel="stylesheet" href="/static/css/base.css" />
  
  <!-- Fonts -->
  <link rel="stylesheet" href="/fonts/fonts.css" />
  
  <!-- Additional CSS based on page -->
  {% block styles %}{% endblock %}
  
  <!-- Additional head content -->
  {% block extra_head %}{% endblock %}
</head>
<body>
  <!-- Page content -->
  {% block content %}{% endblock %}
  
  <!-- JavaScript -->
  {% block scripts %}{% endblock %}
</body>
</html>
