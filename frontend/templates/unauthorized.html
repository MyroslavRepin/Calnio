<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Access Denied | Calnio</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <script
      type="module"
      src="{{ url_for('static', path='js/dashboard.js') }}"
    ></script>
    <script
      defer
      src="https://analytics.calnio.com/script.js"
      data-website-id="4c81d3ea-9951-4d28-b426-129f058ec90e"
    ></script>
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=Montserrat:wght@400;600&display=swap"
      rel="stylesheet"
    />

    <style>
      body {
        font-family: "Montserrat", sans-serif;
        background: linear-gradient(135deg, #c9b89e, #f4f1ed, #d4c5a3);
        min-height: 100vh;
      }
      h1 {
        font-family: "DM Serif Display", serif;
      }
      .glass {
        background: rgba(255 255 255 / 0.2);
        border-radius: 1.5rem;
        backdrop-filter: blur(15px);
        -webkit-backdrop-filter: blur(15px);
        border: 1px solid rgba(255 255 255 / 0.3);
        box-shadow: 0 8px 32px rgb(117 96 72 / 0.3);
      }
      ::selection {
        background-color: #b89e7dcc;
        color: white;
      }
    </style>
  </head>
  <body class="flex items-center justify-center p-6">
    <div class="glass max-w-lg w-full p-10 text-center">
      <h1 class="text-4xl text-coffee-900 mb-6">Access Denied</h1>
      <p class="text-base text-coffee-800 mb-8">
        You must be logged in to access this page.
      </p>
      <a
        href="/login"
        class="inline-block bg-coffee-700 text-black px-6 py-3 rounded-xl font-semibold hover:bg-coffee-800 transition hover:scale-105"
      >
        Go to Login
      </a>
    </div>
  </body>
</html>
